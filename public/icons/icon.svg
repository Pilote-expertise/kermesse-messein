<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a5a"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg-gradient)"/>

  <!-- Tent/Kermesse icon -->
  <g fill="white">
    <!-- Main tent body -->
    <path d="M256 80 L420 350 L92 350 Z" fill="white"/>
    <!-- Tent stripes -->
    <path d="M256 80 L310 350 L202 350 Z" fill="#feca57"/>
    <!-- Tent top decoration -->
    <circle cx="256" cy="80" r="20" fill="#4ecdc4"/>
    <!-- Flag -->
    <path d="M256 40 L256 80 L290 60 Z" fill="#4ecdc4"/>
    <!-- Ground line -->
    <rect x="80" y="340" width="352" height="20" rx="10" fill="white"/>
  </g>

  <!-- Decorative elements -->
  <circle cx="140" cy="180" r="15" fill="#ffe66d"/>
  <circle cx="372" cy="180" r="15" fill="#ffe66d"/>
  <circle cx="180" cy="140" r="10" fill="#4ecdc4"/>
  <circle cx="332" cy="140" r="10" fill="#4ecdc4"/>
</svg>
